name: Deploy Frontend to ECS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: task/frontend
  ECS_CLUSTER: tas-ecs-cluster
  ECS_SERVICE: task-frontend-td-service-bsgh8k49
  TASK_DEFINITION_FAMILY: task-frontend-td

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build, tag, and push image to ECR
      - name: Build, tag and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/task/frontend:$IMAGE_TAG

          docker build -t task/frontend:$IMAGE_TAG .
          docker tag task/frontend:$IMAGE_TAG $IMAGE_URI
          docker push $IMAGE_URI

          echo "IMAGE=$IMAGE_URI" >> $GITHUB_ENV

      # 5. Download current ECS task definition
      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_DEFINITION_FAMILY \
            --query taskDefinition > task-def.json

      # 6. Update task definition with new image
      - name: Render new task definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: frontend-container
          image: ${{ env.IMAGE }}

      # 7. Deploy updated task definition to ECS
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-def.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
